<h1>Specium</h1>
<h2>The Encyclopedia of Living Species</h2>
<section>
  @for (animalClass of classes; track animalClass.id) {
    <article>
      <h3>{{ animalClass.name }}</h3>
      <p>{{ animalClass.description }}</p>
      <a [routerLink]="['/class', animalClass.id]">Explore</a>
    </article>
  }
</section>
