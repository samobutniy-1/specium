<div class="min-h-screen p-8 pt-20">
  <header class="text-center mb-12">
    <h1 class="text-white text-6xl font-bold mb-3">Specium</h1>
    <h2 class="text-white/60 text-xl">The Encyclopedia of Living Species</h2>
  </header>

  <section class="flex flex-wrap gap-6 justify-center">
    @for (animalClass of classes; track animalClass.id) {
      <article
        class="backdrop-blur-md bg-white/10 border border-white/20 rounded-2xl shadow-2xl p-6 w-72 flex flex-col gap-3"
      >
        <h3 class="text-white text-2xl font-bold">{{ animalClass.name }}</h3>
        <p class="text-white/70 text-sm leading-relaxed flex-1">{{ animalClass.description }}</p>
        <a
          [routerLink]="['/class', animalClass.id]"
          class="text-center text-sm text-white/90 border border-white/20 rounded-xl py-2 px-4 hover:bg-white/20 transition-all duration-300"
        >
          Explore
        </a>
      </article>
    }
  </section>
</div>
